# RL 后训练：SmolVLA (LoRA) + SO-101 PickPlace + PPO + 3090 单卡
#
# 为什么 PPO 而不是 GRPO：
#   - pickplace 奖励稀疏（reach/grasp/move/on_plate/success 多阶段），
#     PPO 的 value head + GAE 能做 per-step credit assignment，比 GRPO
#     的 group-norm baseline 在长视距任务上稳。
#   - LoRA RL 下 value head ~1MB VRAM，几乎不增加显存压力。
#   - RLinf 里 PPO 实现/示例更多，bug 更少。
defaults:
  - env/maniskill_so101_pick_place@env.train
  - env/maniskill_so101_pick_place@env.eval
  - model/smolvla@actor.model
  - training_backend/fsdp@actor.fsdp_config
  - weight_syncer/patch_syncer@weight_syncer
  - override hydra/job_logging: stdout

hydra:
  run:
    dir: .
  output_subdir: null
  searchpath:
    - file://${oc.env:EMBODIED_PATH}/config/

cluster:
  num_nodes: 1
  component_placement:
    actor,env,rollout: 0-0       # 3090 单卡，全部 collocated

runner:
  task_type: embodied
  use_training_pipeline: True
  logger:
    log_path: "./results/smolvla_so101"
    project_name: rlinf_smolvla
    experiment_name: "maniskill_ppo_smolvla_so101_3090"
    logger_backends: ["tensorboard"]

  max_steps: -1
  max_epochs: 2000
  only_eval: False
  val_check_interval: 20
  save_interval: 200
  resume_dir: null
  ckpt_path: null

algorithm:
  # === PPO 主体 ===
  adv_type: gae
  loss_type: actor_critic
  normalize_advantages: True
  kl_penalty: kl
  group_size: 1                  # PPO 不用 group
  reward_coef: 1.0

  rollout_epoch: 1
  eval_rollout_epoch: 1
  update_epoch: 1                # 每批 rollout 反复优化 4 次

  # 三件套对齐 flow-based VLA 主流（OpenPI π0.5 / GR00T / DexBotic 等 40+ 个 yaml）：
  # ---
  # reward_type: chunk_level
  #   - env.step() 执行整个 50 步 chunk，累计返回一个 reward
  #   - 一个 chunk → 一个 reward，与下方 logprob_type 同尺度
  # ---
  # logprob_type: chunk_level
  #   - flow_sde 在 SDE 注入步是【一次联合 Gaussian 采样】，整个 [50, 6]=300 个
  #     值是从同一个 (mean, std) 抽出来的；这次"决策"就是这 300 个值整体。
  #   - chunk_level 把 [B,50,6] sum 成 [B]，一个 sample 一个 ratio，
  #     ratio = exp(Σ(new_lp - old_lp))，正好对应 flow 的联合概率公式。
  #   - 6 个关节的【采样值】完整保留在 actions 里送给 env 执行，不丢；
  #     只是 PPO ratio 算的是 chunk 级别。
  #   - 对比：token_level 会把同一次采样的 300 个值当 300 个独立决策做 clip，
  #     违背 flow_sde "一次采样一个决策" 语义；action_level 介于两者之间。
  #   - OpenPI 早期 yaml 用 token_level，新版 pi05 全改 chunk_level，是社区
  #     当前 best practice。
  # ---
  # entropy_type: token_level
  #   - entropy 仅作为正则项（不进 ratio 公式），细粒度信号更好
  #   - 保留 [B,50,6]，平均到每个 (step,dim)，鼓励探索更精细
  reward_type: action_level
  logprob_type: chunk_level
  entropy_type: chunk_level
  loss_agg_func: "token-mean"

  bootstrap_type: always
  kl_beta: 0.01                   # 通常 0；漂得严重再调到 1e-3
  entropy_bonus: 0.005           # PPO 习惯加一点熵正则
  clip_ratio_high: 0.15
  clip_ratio_low: 0.15
  clip_ratio_c: 3.0
  value_clip: 0.2
  huber_delta: 10.0

  gamma: 0.99
  gae_lambda: 0.95

  filter_rewards: False
  rewards_lower_bound: 0.0
  rewards_upper_bound: 1.0

  sampling_params:
    do_sample: True
    temperature_train: 1.0
    temperature_eval: 0.6
    top_k: 50
    top_p: 1.0

  # flow-matching VLA 不做自回归 token 生成（参考 OpenPI π0.5 / GR00T 同类配置）
  # OpenVLA 那种 max_new_token: 7 是 token-based VLA 的设置，不适用于 flow VLA
  length_params:
    max_new_token: null
    max_length: 1024
    min_length: 1

env:
  group_name: "EnvGroup"
  channel:
    name: "env_buffer_list"
    queue_name: "obs_buffer"
    queue_size: 0
  enable_offload: False
  train:
    total_num_envs: 2            # 3090 起步 8，稳了再提到 16
    auto_reset: True
    max_episode_steps: 400       # v3: 200 → 400, 真机 q99=308 步 + margin (~13.3s, 8 chunks)
    max_steps_per_rollout_epoch: 400
    video_cfg:
      save_video: False             # 显式关掉训练录像（基础 env 配置默认是 True，注释掉不等于关闭）
      info_on_video: False
      video_base_dir: ${runner.logger.log_path}/video/train

  eval:
    total_num_envs: 8
    auto_reset: True
    ignore_terminations: True
    max_episode_steps: 400       # 与 train 对齐
    max_steps_per_rollout_epoch: 400
    group_size: ${algorithm.group_size}
    use_fixed_reset_state_ids: True    # eval 固定起始 state，结果可复现
    is_eval: True
    video_cfg:
      save_video: True
      video_base_dir: ${runner.logger.log_path}/video/eval

rollout:
  group_name: "RolloutGroup"
  channel:
    name: ${env.channel.name}
    queue_name: "action_buffer"
    queue_size: 0
  mode: "colocate"
  generation_backend: "huggingface"
  recompute_logprobs: False
  enable_offload: False
#  gpu_memory_utilization: 0.40   # base 冻结后给 actor 更多空间
  pipeline_stage_num: 1
  model:
    ${actor.model}               # 共享 actor model 配置

actor:
  group_name: "ActorGroup"
  channel:
    name: ${env.channel.name}
    queue_name: "replay_buffer"
    queue_size: 0
  training_backend: "fsdp"
  micro_batch_size: 1            # 3090 必须 1
  global_batch_size: 8           # = total_num_envs
  seed: 42
  enable_offload: False
  # === PPO 需要 value head ===
  model:
    with_value_head: True        # 触发 SmolVLAForRLActionPrediction 里建 Linear value_head
    add_value_head: True
  optim:
    type: adamw
    lr: 1.0e-6                   # actor LoRA 学习率
    value_lr: 1.0e-5             # value head 单独更大学习率
#    weight_decay: 0.0
    adam_beta1: 0.9
    adam_beta2: 0.95
    adam_eps: 1.0e-8
    clip_grad: 1.0
    critic_warmup_steps: 50
  fsdp_config:
    strategy: "fsdp"
    sharding_strategy: "no_shard"
    gradient_checkpointing: False
    # LoRA 只训 1.5M / 451M 参数，base 是冻结的——同一个 FSDP unit 里
    # requires_grad 不统一，必须用 use_orig_params=True
    use_orig_params: True
    mixed_precision:
      param_dtype: bf16
      reduce_dtype: fp32
      buffer_dtype: fp32

reward:
  use_reward_model: False        # 用 env 内置 dense reward

critic:
  use_critic_model: False        # value head 内嵌在 actor 里，不用独立 critic group
