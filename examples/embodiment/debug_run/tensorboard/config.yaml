env:
  train:
    env_type: maniskill
    simulator_type: maniskill
    seed: 0
    total_num_envs: 2
    group_size: 1
    auto_reset: true
    ignore_terminations: false
    max_steps_per_rollout_epoch: 400
    max_episode_steps: 400
    use_rel_reward: false
    reward_mode: raw
    use_fixed_reset_state_ids: false
    enable_offload: false
    wrap_obs_mode: simple
    video_cfg:
      save_video: true
      info_on_video: true
      video_base_dir: ./debug_run/video/train
    env:
      eval:
        video_cfg:
          save_video: true
          info_on_video: true
          video_base_dir: ./debug_run/video/eval
    init_params:
      id: SO101PickPlace-v0
      num_envs: null
      obs_mode: rgb
      control_mode: pd_joint_pos
      sim_backend: gpu
      render_mode: rgb_array
      robot_uids: so101
      reward_mode: dense
      sim_config:
        sim_freq: 300
        control_freq: 30
      sensor_configs:
        shader_pack: default
  eval:
    env_type: maniskill
    simulator_type: maniskill
    seed: 0
    total_num_envs: 8
    group_size: 1
    auto_reset: true
    ignore_terminations: true
    max_steps_per_rollout_epoch: 400
    max_episode_steps: 400
    use_rel_reward: false
    reward_mode: raw
    use_fixed_reset_state_ids: true
    enable_offload: false
    wrap_obs_mode: simple
    video_cfg:
      save_video: true
      info_on_video: true
      video_base_dir: ./debug_run/video/eval
    env:
      eval:
        video_cfg:
          save_video: true
          info_on_video: true
          video_base_dir: ./debug_run/video/eval
    init_params:
      id: SO101PickPlace-v0
      num_envs: null
      obs_mode: rgb
      control_mode: pd_joint_pos
      sim_backend: gpu
      render_mode: rgb_array
      robot_uids: so101
      reward_mode: dense
      sim_config:
        sim_freq: 300
        control_freq: 30
      sensor_configs:
        shader_pack: default
    is_eval: true
  group_name: EnvGroup
  channel:
    name: env_buffer_list
    queue_name: obs_buffer
    queue_size: 0
  enable_offload: false
actor:
  model:
    model_type: smolvla
    model_path: /media/zzg/GJ_disk01/pretrained_model/lerobot/smolvla_base
    is_lora: true
    lora_path: /home/zzg/workspace/pycharm/lerobot/src/outputs/train/smolvla_lora32_so101_pickplace_real_fps30_hil_v1/checkpoints/last/pretrained_model
    train_lora_only: true
    lora_rank: 32
    lora_alpha: 8
    precision: bf16
    action_dim: 6
    chunk_size: 50
    num_action_chunks: 50
    img_height: 480
    img_width: 640
    num_images_in_input: 2
    with_value_head: true
    add_value_head: true
    value_hidden_sizes:
    - 512
    - 128
    value_activation: relu
    chunk_critic_input: true
    detach_critic_input: false
    noise_method: flow_sde
    noise_level: 0.5
    noise_anneal: false
    noise_params:
    - 0.7
    - 0.3
    - 400
    num_steps: 10
    ignore_last: false
    joint_logprob: false
    safe_get_logprob: false
    unnorm_key: so101_pickplace_real
    policy_setup: so101
  fsdp_config:
    strategy: fsdp
    sharding_strategy: no_shard
    gradient_checkpointing: false
    cpu_offload: false
    offload_pin_memory: false
    reshard_after_forward: true
    enable_gradient_accumulation: true
    forward_prefetch: false
    limit_all_gathers: false
    backward_prefetch: null
    use_orig_params: true
    use_liger_kernel: false
    mixed_precision:
      param_dtype: bf16
      reduce_dtype: fp32
      buffer_dtype: fp32
    amp_autocast:
      enabled: false
      precision: bf16
    grad_scaler:
      enabled: false
      init_scale: null
      growth_interval: null
  group_name: ActorGroup
  channel:
    name: env_buffer_list
    queue_name: replay_buffer
    queue_size: 0
  training_backend: fsdp
  micro_batch_size: 1
  global_batch_size: 8
  seed: 42
  enable_offload: false
  optim:
    type: adamw
    lr: 5.0e-06
    value_lr: 0.0001
    adam_beta1: 0.9
    adam_beta2: 0.95
    adam_eps: 1.0e-08
    clip_grad: 1.0
    critic_warmup_steps: 50
weight_syncer:
  type: patch
  patch:
    snapshot_device: cpu
    delta_encoding: true
    compression: none
    init_sync:
      enabled: true
      prefixes: null
      bucket_size: 134217728
cluster:
  num_nodes: 1
  component_placement:
    actor,env,rollout: 0-0
runner:
  task_type: embodied
  logger:
    log_path: ./debug_run
    project_name: rlinf_smolvla
    experiment_name: maniskill_ppo_smolvla_so101_3090
    logger_backends:
    - tensorboard
  max_steps: -1
  only_eval: true
  val_check_interval: 1
  max_epochs: 1
  save_interval: 200
  resume_dir: null
  ckpt_path: null
  per_worker_log: false
  per_worker_log_path: null
  nsight_output_path: null
  weight_sync_interval: 1
  overlap_env_bootstrap: false
algorithm:
  adv_type: gae
  loss_type: actor_critic
  normalize_advantages: true
  kl_penalty: kl
  group_size: 1
  reward_coef: 1.0
  rollout_epoch: 1
  eval_rollout_epoch: 1
  update_epoch: 4
  reward_type: chunk_level
  logprob_type: chunk_level
  entropy_type: token_level
  loss_agg_func: token-mean
  bootstrap_type: always
  kl_beta: 0.0
  entropy_bonus: 0.005
  clip_ratio_high: 0.15
  clip_ratio_low: 0.15
  clip_ratio_c: 3.0
  value_clip: 0.2
  huber_delta: 10.0
  gamma: 0.99
  gae_lambda: 0.95
  filter_rewards: false
  rewards_lower_bound: 0.0
  rewards_upper_bound: 1.0
  sampling_params:
    do_sample: true
    temperature_train: 1.0
    temperature_eval: 0.6
    top_k: 50
    top_p: 1.0
  length_params:
    max_new_token: null
    max_length: 1024
    min_length: 1
rollout:
  group_name: RolloutGroup
  channel:
    name: env_buffer_list
    queue_name: action_buffer
    queue_size: 0
  mode: colocate
  generation_backend: huggingface
  recompute_logprobs: false
  enable_offload: false
  pipeline_stage_num: 1
  model:
    model_type: smolvla
    model_path: /media/zzg/GJ_disk01/pretrained_model/lerobot/smolvla_base
    is_lora: true
    lora_path: /home/zzg/workspace/pycharm/lerobot/src/outputs/train/smolvla_lora32_so101_pickplace_real_fps30_hil_v1/checkpoints/last/pretrained_model
    train_lora_only: true
    lora_rank: 32
    lora_alpha: 8
    precision: bf16
    action_dim: 6
    chunk_size: 50
    num_action_chunks: 50
    img_height: 480
    img_width: 640
    num_images_in_input: 2
    with_value_head: true
    add_value_head: true
    value_hidden_sizes:
    - 512
    - 128
    value_activation: relu
    chunk_critic_input: true
    detach_critic_input: false
    noise_method: flow_sde
    noise_level: 0.5
    noise_anneal: false
    noise_params:
    - 0.7
    - 0.3
    - 400
    num_steps: 10
    ignore_last: false
    joint_logprob: false
    safe_get_logprob: false
    unnorm_key: so101_pickplace_real
    policy_setup: so101
reward:
  use_reward_model: false
critic:
  use_critic_model: false
